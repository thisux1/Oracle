<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 240" width="100%" height="100%">
  <defs>
    <!-- Glowing filters -->
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-magenta" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    .bg { fill: #050204; }
    .title { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: rgba(255, 255, 255, 0.4); letter-spacing: 2px; }
    .node-text { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: bold; }
    .node-subtext { font-family: 'JetBrains Mono', monospace; font-size: 9px; fill: rgba(255, 255, 255, 0.5); }
    .conn-line { fill: none; stroke-width: 1.5; stroke-dasharray: 4 4; }
    .flow-arrow { fill: none; stroke-width: 1.5; }
    
    /* Animation for active flow lines */
    @keyframes dash {
      to {
        stroke-dashoffset: -20;
      }
    }
    .flow-active {
      animation: dash 1s linear infinite;
    }
  </style>

  <!-- Background -->
  <rect class="bg" width="100%" height="100%"/>
  <rect x="1" y="1" width="1078" height="238" fill="none" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1"/>

  <!-- GRID DECORATION -->
  <line x1="0" y1="40" x2="1080" y2="40" stroke="rgba(255, 255, 255, 0.03)" stroke-width="1"/>
  <text x="20" y="25" class="title">ORACLE V3 AUTOMATION SYSTEM &amp; DATA PIPELINE</text>
  
  <!-- ==================== NODE 1: DISCORD CONNECTION ==================== -->
  <g transform="translate(40, 70)">
    <polygon points="10,0 150,0 160,10 160,80 150,90 10,90 0,80 0,10" fill="rgba(255, 255, 255, 0.02)" stroke="rgba(255, 255, 255, 0.2)" stroke-width="1.5"/>
    <text x="20" y="30" class="node-text" fill="#ffffff">01. DISCORD API</text>
    <text x="20" y="50" class="node-subtext">discord.py-self</text>
    <text x="20" y="65" class="node-subtext">Websocket Stream</text>
    <rect x="15" y="75" width="45" height="1" fill="#a855f7" filter="url(#glow-purple)"/>
  </g>

  <!-- Flow 1 -> 2 -->
  <path class="conn-line flow-active" d="M 200,115 L 250,115" stroke="#a855f7" />
  <path class="flow-arrow" d="M 245,110 L 250,115 L 245,120" stroke="#a855f7" />

  <!-- ==================== NODE 2: STATE ENGINE ==================== -->
  <g transform="translate(250, 70)">
    <polygon points="10,0 150,0 160,10 160,80 150,90 10,90 0,80 0,10" fill="rgba(168, 85, 247, 0.02)" stroke="#a855f7" stroke-width="1.5" filter="url(#glow-purple)"/>
    <text x="20" y="30" class="node-text" fill="#ffffff">02. STATE DETECTOR</text>
    <text x="20" y="50" class="node-subtext">Message Parser</text>
    <text x="20" y="65" class="node-subtext">Queue Manager</text>
    <text x="20" y="80" class="node-subtext" fill="#a855f7" font-size="8">[ STATE MACHINE ]</text>
  </g>

  <!-- Flow 2 -> 3 -->
  <path class="conn-line flow-active" d="M 410,115 L 460,115" stroke="#ec4899" />
  <path class="flow-arrow" d="M 455,110 L 460,115 L 455,120" stroke="#ec4899" />

  <!-- ==================== NODE 3: AI ENGINE ==================== -->
  <g transform="translate(460, 70)">
    <polygon points="10,0 150,0 160,10 160,80 150,90 10,90 0,80 0,10" fill="rgba(236, 72, 153, 0.02)" stroke="#ec4899" stroke-width="1.5" filter="url(#glow-magenta)"/>
    <text x="20" y="30" class="node-text" fill="#ffffff">03. AI ENGINE</text>
    <text x="20" y="50" class="node-subtext">TensorFlow Lite CNN</text>
    <text x="20" y="65" class="node-subtext">Captcha Solver</text>
    <text x="20" y="80" class="node-subtext" fill="#ec4899" font-size="8">[ TFLITE PREDICTION ]</text>
  </g>

  <!-- Flow 3 -> 4 -->
  <path class="conn-line flow-active" d="M 620,115 L 670,115" stroke="#38bdf8" />
  <path class="flow-arrow" d="M 665,110 L 670,115 L 665,120" stroke="#38bdf8" />

  <!-- ==================== NODE 4: DUAL CONTROLLER ==================== -->
  <g transform="translate(670, 70)">
    <polygon points="10,0 150,0 160,10 160,80 150,90 10,90 0,80 0,10" fill="rgba(56, 189, 248, 0.02)" stroke="#38bdf8" stroke-width="1.5" filter="url(#glow-cyan)"/>
    <text x="20" y="30" class="node-text" fill="#ffffff">04. CONTROL HUB</text>
    <text x="20" y="50" class="node-subtext">FastAPI Server</text>
    <text x="20" y="65" class="node-subtext">Textual TUI / React</text>
    <text x="20" y="80" class="node-subtext" fill="#38bdf8" font-size="8">[ DUAL INTERFACE ]</text>
  </g>

  <!-- Flow 4 -> 5 -->
  <path class="conn-line flow-active" d="M 830,115 L 880,115" stroke="#ffffff" />
  <path class="flow-arrow" d="M 875,110 L 880,115 L 875,120" stroke="#ffffff" />

  <!-- ==================== NODE 5: HUMANIZATOR ==================== -->
  <g transform="translate(880, 70)">
    <polygon points="10,0 150,0 160,10 160,80 150,90 10,90 0,80 0,10" fill="rgba(255, 255, 255, 0.02)" stroke="rgba(255, 255, 255, 0.6)" stroke-width="1.5"/>
    <text x="20" y="30" class="node-text" fill="#ffffff">05. HUMAN SHIELD</text>
    <text x="20" y="50" class="node-subtext">Randomized Cooldowns</text>
    <text x="20" y="65" class="node-subtext">Sleep &amp; Break Cycles</text>
    <text x="20" y="80" class="node-subtext" fill="#ffffff" font-size="8">[ ANTI-DETECTION ]</text>
  </g>

  <!-- Decal coordinates at the bottom -->
  <text x="20" y="210" class="node-subtext" fill="rgba(255, 255, 255, 0.2)">TELEMETRY_LATENCY: ~10MS // SIGNAL: OPTIMAL</text>
  <text x="1060" y="210" class="node-subtext" fill="rgba(255, 255, 255, 0.2)" text-anchor="end">AI_ACCURACY: 99.4% [COLOR/GRAY]</text>
</svg>

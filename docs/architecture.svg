<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 260" width="100%" height="100%">
  <defs>
    <!-- Background subtle grid pattern -->
    <pattern id="grid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="rgba(0, 242, 255, 0.015)" stroke-width="1"/>
    </pattern>

    <!-- Glowing filters -->
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-cyan" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-magenta" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <style>
    .bg { fill: #07090e; }
    .grid-bg { fill: url(#grid); }
    .window-bg { fill: #0b0e14; }
    .window-header { fill: #121824; }
    
    .term-title { font-family: 'JetBrains Mono', monospace; font-size: 11px; fill: rgba(255, 255, 255, 0.7); font-weight: bold; }
    .term-status { font-family: 'JetBrains Mono', monospace; font-size: 10px; fill: #00ffaa; }
    .node-header-text { font-family: 'JetBrains Mono', monospace; font-size: 9px; fill: rgba(255, 255, 255, 0.5); font-weight: bold; }
    .node-title { font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: bold; fill: #ffffff; }
    .node-subtext { font-family: 'JetBrains Mono', monospace; font-size: 9px; fill: rgba(255, 255, 255, 0.45); }
    .node-status { font-family: 'JetBrains Mono', monospace; font-size: 8px; font-weight: bold; }
  </style>

  <!-- BACKGROUND -->
  <rect class="bg" width="100%" height="100%"/>
  <rect class="grid-bg" width="100%" height="100%"/>

  <!-- CLI SHELL WINDOW WRAPPER BORDER -->
  <rect x="1" y="1" width="1078" height="258" fill="none" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1"/>

  <!-- ==================== HEADER BAR ==================== -->
  <rect x="0" y="0" width="1080" height="30" class="window-header" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1" />
  <!-- Window Controls -->
  <circle cx="20" cy="15" r="4.5" fill="#ff5f56" />
  <circle cx="32" cy="15" r="4.5" fill="#ffbd2e" />
  <circle cx="44" cy="15" r="4.5" fill="#27c93f" />
  <!-- Window Title -->
  <text x="65" y="19" class="term-title">oracle_system_architecture.sh</text>

  <!-- ==================== FLOW CHANNELS & ANIMATED DATA PACKETS ==================== -->
  <!-- Channel 1 -> 2 -->
  <path d="M 200,115 L 240,115" fill="none" stroke="rgba(181, 23, 158, 0.15)" stroke-width="2" />
  <rect x="-3" y="-3" width="6" height="6" fill="#b5179e" rx="1" filter="url(#glow-purple)">
    <animateMotion dur="1.8s" repeatCount="indefinite" path="M 200,115 L 240,115" />
  </rect>

  <!-- Channel 2 -> 3 -->
  <path d="M 410,115 L 450,115" fill="none" stroke="rgba(0, 242, 255, 0.15)" stroke-width="2" />
  <rect x="-3" y="-3" width="6" height="6" fill="#00f2ff" rx="1" filter="url(#glow-cyan)">
    <animateMotion dur="1.8s" repeatCount="indefinite" path="M 410,115 L 450,115" />
  </rect>

  <!-- Channel 3 -> 4 -->
  <path d="M 620,115 L 660,115" fill="none" stroke="rgba(236, 72, 153, 0.15)" stroke-width="2" />
  <rect x="-3" y="-3" width="6" height="6" fill="#ec4899" rx="1" filter="url(#glow-magenta)">
    <animateMotion dur="1.8s" repeatCount="indefinite" path="M 620,115 L 660,115" />
  </rect>

  <!-- Channel 4 -> 5 -->
  <path d="M 830,115 L 870,115" fill="none" stroke="rgba(0, 255, 170, 0.15)" stroke-width="2" />
  <rect x="-3" y="-3" width="6" height="6" fill="#00ffaa" rx="1" filter="url(#glow-green)">
    <animateMotion dur="1.8s" repeatCount="indefinite" path="M 830,115 L 870,115" />
  </rect>

  <!-- ==================== NODE 1: DISCORD CONNECTION ==================== -->
  <g transform="translate(30, 65)">
    <!-- Terminal Window Frame -->
    <rect x="0" y="0" width="170" height="100" class="window-bg" stroke="#b5179e" stroke-width="1.5" rx="3" filter="url(#glow-purple)" />
    <!-- Header bar -->
    <path d="M 1,1 L 169,1 L 169,20 L 1,20 Z" class="window-header" />
    <line x1="0" y1="20" x2="170" y2="20" stroke="#b5179e" stroke-width="1" />
    <!-- Control dots -->
    <circle cx="10" cy="10" r="2.5" fill="rgba(255,255,255,0.2)" />
    <circle cx="16" cy="10" r="2.5" fill="rgba(255,255,255,0.2)" />
    <circle cx="22" cy="10" r="2.5" fill="rgba(255,255,255,0.2)" />
    <!-- Mini label -->
    <text x="32" y="13" class="node-header-text">discord_api.py</text>
    
    <!-- Body Content -->
    <text x="12" y="42" class="node-title">01. DISCORD API</text>
    <text x="12" y="60" class="node-subtext">discord.py-self wrapper</text>
    <text x="12" y="74" class="node-subtext">Websocket Stream</text>
    <text x="12" y="88" class="node-status" fill="#b5179e">[ CONNECTED ]</text>
  </g>

  <!-- ==================== NODE 2: STATE ENGINE ==================== -->
  <g transform="translate(240, 65)">
    <!-- Terminal Window Frame -->
    <rect x="0" y="0" width="170" height="100" class="window-bg" stroke="#00f2ff" stroke-width="1.5" rx="3" filter="url(#glow-cyan)" />
    <!-- Header bar -->
    <path d="M 1,1 L 169,1 L 169,20 L 1,20 Z" class="window-header" />
    <line x1="0" y1="20" x2="170" y2="20" stroke="#00f2ff" stroke-width="1" />
    <!-- Control dots -->
    <circle cx="10" cy="10" r="2.5" fill="rgba(255,255,255,0.2)" />
    <circle cx="16" cy="10" r="2.5" fill="rgba(255,255,255,0.2)" />
    <circle cx="22" cy="10" r="2.5" fill="rgba(255,255,255,0.2)" />
    <!-- Mini label -->
    <text x="32" y="13" class="node-header-text">state_engine.go</text>

    <!-- Body Content -->
    <text x="12" y="42" class="node-title">02. STATE ENGINE</text>
    <text x="12" y="60" class="node-subtext">Log parser &amp; queue</text>
    <text x="12" y="74" class="node-subtext">Task sequence manager</text>
    <text x="12" y="88" class="node-status" fill="#00f2ff">[ ACTIVE ]</text>
  </g>

  <!-- ==================== NODE 3: AI ENGINE ==================== -->
  <g transform="translate(450, 65)">
    <!-- Terminal Window Frame -->
    <rect x="0" y="0" width="170" height="100" class="window-bg" stroke="#ec4899" stroke-width="1.5" rx="3" filter="url(#glow-magenta)" />
    <!-- Header bar -->
    <path d="M 1,1 L 169,1 L 169,20 L 1,20 Z" class="window-header" />
    <line x1="0" y1="20" x2="170" y2="20" stroke="#ec4899" stroke-width="1" />
    <!-- Control dots -->
    <circle cx="10" cy="10" r="2.5" fill="rgba(255,255,255,0.2)" />
    <circle cx="16" cy="10" r="2.5" fill="rgba(255,255,255,0.2)" />
    <circle cx="22" cy="10" r="2.5" fill="rgba(255,255,255,0.2)" />
    <!-- Mini label -->
    <text x="32" y="13" class="node-header-text">captcha_solver.py</text>

    <!-- Body Content -->
    <text x="12" y="42" class="node-title">03. AI SOLVER</text>
    <text x="12" y="60" class="node-subtext">TFLite CNN Model</text>
    <text x="12" y="74" class="node-subtext">Captcha detector</text>
    <text x="12" y="88" class="node-status" fill="#ec4899">[ ARMED ]</text>
  </g>

  <!-- ==================== NODE 4: CONTROL HUB ==================== -->
  <g transform="translate(660, 65)">
    <!-- Terminal Window Frame -->
    <rect x="0" y="0" width="170" height="100" class="window-bg" stroke="#00ffaa" stroke-width="1.5" rx="3" filter="url(#glow-green)" />
    <!-- Header bar -->
    <path d="M 1,1 L 169,1 L 169,20 L 1,20 Z" class="window-header" />
    <line x1="0" y1="20" x2="170" y2="20" stroke="#00ffaa" stroke-width="1" />
    <!-- Control dots -->
    <circle cx="10" cy="10" r="2.5" fill="rgba(255,255,255,0.2)" />
    <circle cx="16" cy="10" r="2.5" fill="rgba(255,255,255,0.2)" />
    <circle cx="22" cy="10" r="2.5" fill="rgba(255,255,255,0.2)" />
    <!-- Mini label -->
    <text x="32" y="13" class="node-header-text">control_hub.py</text>

    <!-- Body Content -->
    <text x="12" y="42" class="node-title">04. CONTROL HUB</text>
    <text x="12" y="60" class="node-subtext">FastAPI websocket api</text>
    <text x="12" y="74" class="node-subtext">Textual TUI interface</text>
    <text x="12" y="88" class="node-status" fill="#00ffaa">[ STANDBY ]</text>
  </g>

  <!-- ==================== NODE 5: HUMANIZATOR ==================== -->
  <g transform="translate(870, 65)">
    <!-- Terminal Window Frame -->
    <rect x="0" y="0" width="170" height="100" class="window-bg" stroke="rgba(255, 255, 255, 0.4)" stroke-width="1.5" rx="3" />
    <!-- Header bar -->
    <path d="M 1,1 L 169,1 L 169,20 L 1,20 Z" class="window-header" />
    <line x1="0" y1="20" x2="170" y2="20" stroke="rgba(255, 255, 255, 0.4)" stroke-width="1" />
    <!-- Control dots -->
    <circle cx="10" cy="10" r="2.5" fill="rgba(255,255,255,0.2)" />
    <circle cx="16" cy="10" r="2.5" fill="rgba(255,255,255,0.2)" />
    <circle cx="22" cy="10" r="2.5" fill="rgba(255,255,255,0.2)" />
    <!-- Mini label -->
    <text x="32" y="13" class="node-header-text">human_shield.sh</text>

    <!-- Body Content -->
    <text x="12" y="42" class="node-title">05. HUMAN SHIELD</text>
    <text x="12" y="60" class="node-subtext">Randomized cooldowns</text>
    <text x="12" y="74" class="node-subtext">Sleep &amp; Break cycles</text>
    <text x="12" y="88" class="node-status" fill="rgba(255,255,255,0.6)">[ ENFORCING ]</text>
  </g>

  <!-- ==================== FOOTER STATUS BAR ==================== -->
  <rect x="0" y="230" width="1080" height="30" class="window-header" stroke="rgba(255, 255, 255, 0.05)" stroke-width="1" />
  <text x="20" y="249" class="term-status">&gt; telemetry: active | latency: ~10ms | accuracy: 99.4% | status: stable</text>
</svg>

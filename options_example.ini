# ==========================================
# Epic RPG Oracle v2 - Configuration File
# ==========================================
# Rename this file to 'options.ini' and fill in your details.
# DO NOT share your options.ini file with anyone.

# --- Account Tokens ---
# Your Discord Token (Never share this!)
user_token=YOUR_DISCORD_TOKEN_HERE



# --- Discord IDs ---
# The channel where the bot will send commands
channel_id=123456789012345678
# The server/guild ID where the channel is located
guild_id=123456789012345678
# List of user IDs authorized to use manual bot commands (comma separated)
admin_ids=123456789012345678, 987654321098765432

# --- Telegram Notifications (Anti-ban security) ---
# Create a bot via @BotFather on Telegram
telegram_bot_token=YOUR_TELEGRAM_BOT_TOKEN
# Your personal Telegram chat ID (Use @userinfobot to find yours)
telegram_chat_id=123456789

# --- Gameplay Settings ---
# Main work command (e.g., fish, chop, mine, chainsaw)
work_command=fish
# Seed to plant (e.g., bread, potato, carrot)
seed=none
# Lootbox type to buy (e.g., ed lb, common lb)
lootbox_type=ed lb
# Use human-like random delays between actions? (true/false) (recommended: true)
random_interval=true

# --- Area & Event Settings ---
# For returning after area changing events
current_area=none
# For moving to another area before starting advs
adventure_area=none
# Lifeboost to buy before advs (e.g., a, b, c)
life_boost_before_adv=none
# Action to take when zombie horde event spawns (e.g., fight, none)
zombie_horde_event_response=fight
# How many days left to close the void? (Used for training in void)
daysToCloseVoid=3
# Automatically stop Time Cookie mode when it detects these events are ready (e.g., dungeon, Card Hand, none)
tc_stop_on=dungeon

# --- Gambling & Casino (Fibonacci Strategy) ---
# The amount of coins you have available in you account (or smaller numbers for less risk and profit).
bankroll=1000000000000
# The maximum number of consecutive losses you are willing to accept before restarting (loss cap).
max_losses=20
# The starting multiplier in the Fibonacci sequence (default is 1, then 1, then 2, then 3, then 5, etc.).
initial_step=1

# --- Marriage & Ascension ---
is_married=false
is_ascended=false
# If married, the partner's exact name for hunt tracking (just text)
partner_name=none

# --- Stealth & Anti-Ban ---
# Chance to simulate a human typo and then correct it in every command sent(e.g. 0.05 for 5% chance)
typo_chance=0.05
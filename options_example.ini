language=pt # Bot language (pt = Portuguese, en = English)
user_token= #your discord user token here

channel_id=03290409094323 #your discord channel id here
guild_id=42342342345646 #guild(server) id to use for commands. ***preferably use it in a non public server with only people you trust for no risk of report/ban***
random_interval=true #random interval between commands (1s minimum if false, +1-4s if true)
typo_chance=0.05 #chance of making a typo when writing commands (e.g. 0.05 = 5%)
life_boost_before_adv=none #life boost before adventure (a, b, c)
adventure_area=none #recieve less dmg to avoid dying doing adv in lower areas
current_area=none #current area for getitng back in case of random events moving you
lootbox_type=ed lb #lootbox type to buy(ed lb, ep lb, rare lb, uncommon lb, common lb)
seed=carrot #seed to farm (carrot, potato, bread)
work_command=chainsaw #work command to use (chainsaw, pickaxe, bigboat, greenhouse, u got it)
zombie_horde_event_response=fight #response to zombie horde event (fight, join, cry)
telegram_bot_token=#optional telegram bot token for notifications, get it from @BotFather
telegram_chat_id=9824899275 #optional telegram chat id for notifications, get it from telegram urls
bankroll=1000000000000 #your max ammount of money
max_losses=20 #max losses for the strategy (recommended 15-30)
initial_step=1 #initial step for the strategy (recommended 1-3)
do_hunt=true
do_adv=true
pet_adventure_command=rpg pet adv learn a # Comando de aventura do pet. Aceita formatos como: 'find epic', 'learn a', ou o comando completo 'rpg pet adv find epic'. O bot irá normalizar automaticamente. Padrão: 'rpg pet adv learn a'.
do_farm=true
do_work=true
do_training=true
do_daily=true
do_weekly=true
do_quest=true
do_lootbox=true
do_dungeon=true
do_card_hand=true
do_duel=false  # Ativa ou desativa a automação de duelos
win_duel=true  # Se true, escolhe arma para ganhar duelos. Se false, não envia arma para perder por WO (entrega do duelo)
duel_partner_id=  # ID numérico da conta parceira de duelos
do_pet=true  # Ativa ou desativa a automação e coleta de aventuras de pets
do_ultr=false  # overrides do_training. Sequence: rpg ultr -> double -> attack -> rpg use tc
card_hand_action=auto  # "auto": híbrido (usa Neon + aceita override via Telegram, com timeout de 15s/5s) | "legacy_auto": automático direto via Neon sem interação. Quando do_card_hand=false, apenas notifica via Telegram (1x/hora).
tc_quantity=1  # quantidade padrão de cookies usados ao usar sb tc start (pode ser alterada via comando "sb tc start Xc")
is_eternal=false  # habilita entrda automatica da dungeon eternal e loop de bite até concluir
eternal_tier=t1  # tier de eternal (t1 a t10). Se >= 7, desabilita subcomandos do ultr
is_married=false # habilitar casamento (marriage)
partner_name= # nome do parceiro(a) se casado (lowercase)
is_ascended=false # habilitar comportamento para jogador ascendido (ascended)
admin_ids= # IDs de discord adicionais de admins separados por vírgula para controle remoto via chat
tc_stop_on=dungeon,miniboss # eventos que pausam o uso de Time Cookies (TC)
sleep_at=23:00 #hora de dormir do bot (formato 24h)
wake_up_at=09:00 #acordar o bot automaticamente nesse horário (formato 24h)
theme=dracula #Tema salvo (cathedral, dracula, nord, monokai, gruvbox, catppuccin, tokyonight, rosepine, solarized, cyberpunk)